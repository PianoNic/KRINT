<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KRINT</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #0b0d12;
        color: #e6e8ee;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .box { text-align: center; }
      .spinner {
        width: 36px; height: 36px;
        margin: 0 auto 16px;
        border: 3px solid #2a2f3a;
        border-top-color: #6ea8fe;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .muted { color: #8a92a6; font-size: 13px; margin-top: 6px; }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="spinner"></div>
      <div>Starting KRINT…</div>
      <div class="muted">Bringing up the local backend and sign-in service</div>
    </div>
  </body>
</html>
