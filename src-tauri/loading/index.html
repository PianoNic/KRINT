<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KRINT</title>
    <style>
      /* shadcn/ui design tokens (zinc) — dark by default, light via prefers-color-scheme. */
      :root {
        --background: 240 10% 3.9%;
        --card: 240 10% 3.9%;
        --card-foreground: 0 0% 98%;
        --muted-foreground: 240 5% 64.9%;
        --border: 240 3.7% 15.9%;
        --primary: 0 0% 98%;
        --primary-foreground: 240 5.9% 10%;
        --radius: 0.75rem;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --background: 0 0% 100%;
          --card: 0 0% 100%;
          --card-foreground: 240 10% 3.9%;
          --muted-foreground: 240 3.8% 46.1%;
          --border: 240 5.9% 90%;
          --primary: 240 5.9% 10%;
          --primary-foreground: 0 0% 98%;
        }
      }
      * { box-sizing: border-box; }
      html, body {
        height: 100%;
        margin: 0;
        background: hsl(var(--background));
        color: hsl(var(--card-foreground));
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
      }
      .card {
        width: 360px;
        max-width: calc(100vw - 2rem);
        background: hsl(var(--card));
        border: 1px solid hsl(var(--border));
        border-radius: var(--radius);
        box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        padding: 2rem 1.75rem;
        text-align: center;
      }
      .brand {
        width: 52px; height: 52px;
        margin: 0 auto 1.25rem;
        display: block;
      }
      .title {
        font-size: 1.25rem; font-weight: 600; letter-spacing: -0.01em;
        margin: 0 0 0.375rem;
      }
      .subtitle {
        color: hsl(var(--muted-foreground));
        font-size: 0.875rem; line-height: 1.4;
        margin: 0 0 1.5rem;
      }
      .divider {
        height: 1px; background: hsl(var(--border));
        margin: 0 0 1.25rem;
      }
      .status {
        display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      }
      .spinner {
        width: 16px; height: 16px; flex: none;
        border: 2px solid hsl(var(--border));
        border-top-color: hsl(var(--card-foreground));
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .muted { color: hsl(var(--muted-foreground)); font-size: 0.8125rem; }
    </style>
  </head>
  <body>
    <div class="card">
      <svg class="brand" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-label="KRINT logo">
        <rect width="64" height="64" rx="14" fill="#0B1220" />
        <g fill="#FFFFFF">
          <rect x="14" y="14" width="14" height="8" rx="3" />
          <rect x="14" y="28" width="14" height="8" rx="3" />
          <rect x="14" y="42" width="14" height="8" rx="3" />
          <path d="M 24 32 L 36 14 L 50 14 L 38 32 Z" />
          <path d="M 24 32 L 38 32 L 50 50 L 36 50 Z" />
        </g>
      </svg>
      <h1 class="title">KRINT</h1>
      <p class="subtitle">Signing you in to your local workspace</p>
      <div class="divider"></div>
      <div class="status">
        <div class="spinner"></div>
        <span class="muted">Starting the local backend…</span>
      </div>
    </div>
  </body>
</html>
