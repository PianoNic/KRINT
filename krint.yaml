krint:
  # Where provisioned instances persist their data.
  #
  #   mode: Volume      -> each instance gets a named docker volume "krint-{slug}-data".
  #                        Docker manages the storage; the host doesn't need a preset path.
  #                        This is the default and matches the historical behaviour.
  #
  #   mode: HostFolder  -> bind-mount {host_path}/{containerName} into each container's data
  #                        directory. Pick this when you want to back up or inspect the
  #                        on-disk files directly from the host.
  #
  # Switching modes only affects NEW provisions; existing instances keep whatever bind
  # they were created with. When KRINT itself runs inside a container and you want
  # `Delete instance` to also wipe the host folder, mount {host_path} into the KRINT
  # container at the same path (otherwise Directory.Delete fails silently and you
  # remove the subdirectory by hand).
  storage:
    mode: Volume
    # host_path: /data/krint        # required if mode is HostFolder
  port_ranges:
    postgres:     30000-30099
    timescaledb:  30100-30199
    mysql:        30200-30399
    mariadb:      30400-30599
    mssql:        30600-30799
    mongo:        30800-30999
    redis:        31000-31199
    cockroachdb:    31200-31399
    clickhouse:     31400-31599
    cassandra:      31600-31799
    couchdb:        32000-32199
    elasticsearch:  32200-32399
    neo4j:          33200-33399
    qdrant:         34000-34199
    valkey:         34200-34399
    seaweedfs:      34400-34599
    pgvector:       34600-34799
    azurite:        34800-34999
