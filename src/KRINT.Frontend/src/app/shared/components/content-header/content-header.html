<header class="flex items-center justify-between gap-3 px-4 py-2">
  <div class="flex min-w-0 items-center gap-2">
    <button hlmSidebarTrigger type="button">
      <span class="sr-only">Toggle sidebar</span>
    </button>
    <ng-content select="[slot=left]" />
  </div>
  <div class="flex min-w-0 items-center gap-3">
    <ng-content select="[slot=right]" />
    <a
      hlmBtn
      variant="ghost"
      size="icon"
      href="https://github.com/PianoNic/KRINT"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="KRINT Repo"
      hlmTooltip="KRINT Repo"
    >
      <ng-icon name="simpleGithub" size="16" />
    </a>
    <a
      hlmBtn
      variant="ghost"
      size="icon"
      href="https://buymeacoffee.com/pianonic"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Buy me a coffee"
      hlmTooltip="Buy me a coffee"
    >
      <ng-icon name="simpleBuymeacoffee" size="16" />
    </a>
  </div>
</header>
