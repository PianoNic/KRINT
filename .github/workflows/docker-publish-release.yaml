name: Docker Publish Multi-Arch on Release

on:
  release:
    types: [published]

jobs:
  sync-version:
    name: Sync application.properties with release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Use MAIN_PUSH_TOKEN (a PAT owned by the maintainer, with contents:write and listed
      # under branch protection bypass-actors) so the resulting commit is authored by the
      # maintainer and skips the PR requirement on main. Fall back to GITHUB_TOKEN if the
      # secret is missing; the push will fail on a protected main in that case, which is the
      # signal to provision the secret.
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.MAIN_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git as the maintainer
        run: |
          git config user.name "PianoNic"
          git config user.email "79938743+PianoNic@users.noreply.github.com"

      - name: Compare versions and commit if different
        run: |
          TAG_VERSION="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          FILE_VERSION=$(grep -oP '(?<=<version>)[^<]+' application.properties)

          echo "Release tag version: $TAG_VERSION"
          echo "File version:        $FILE_VERSION"

          if [ "$TAG_VERSION" = "$FILE_VERSION" ]; then
            echo "Already in sync, nothing to commit."
            exit 0
          fi

          sed -i "s|<version>$FILE_VERSION</version>|<version>$TAG_VERSION</version>|" application.properties

          git add application.properties
          git commit -m "Bumped application.properties to $TAG_VERSION for release"
          git push origin HEAD:main

  build-and-push-multiarch:
    name: Build and Push Multi-Arch Docker Images
    needs: sync-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Build from main (post-sync) so the image bakes the corrected version even if the
      # release tag's commit had the old number.
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare repository name
        id: prep
        run: |
          echo "repository_lowercase=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}},value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build and push Multi-Arch Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/KRINT.API/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/${{ steps.prep.outputs.repository_lowercase }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/${{ steps.prep.outputs.repository_lowercase }}:buildcache,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          provenance: false
          sbom: false
