name: Desktop Build on Release

# Builds the cross-platform desktop app (Tauri + KRINT.API sidecar) and attaches the
# installers and portable archives to the GitHub Release, alongside the Docker image
# produced by docker-publish-release.yaml.

on:
  release:
    types: [published]

jobs:
  desktop:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04,   label: Linux x64,   rid: linux-x64, portable: appimage }
          - { os: windows-latest, label: Windows x64,  rid: win-x64,   portable: zip }
          - { os: macos-14,       label: macOS arm64,  rid: osx-arm64, portable: zip }
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up Bun (frontend)
        uses: oven-sh/setup-bun@v2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: bun install

      # The committed tauri.conf.json / Cargo.toml versions are not the release version, so
      # stamp the bundles (and the binary) with the tag instead - otherwise every installer is
      # named after the placeholder version. Runs on all three runners (bash is available on
      # the Windows runner via Git Bash).
      - name: Stamp desktop version from release tag
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          export VERSION="${TAG#v}"
          node -e "
            const fs = require('fs');
            const conf = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(conf, 'utf8'));
            c.version = process.env.VERSION;
            fs.writeFileSync(conf, JSON.stringify(c, null, 2) + '\n');
            const cargo = 'src-tauri/Cargo.toml';
            const t = fs.readFileSync(cargo, 'utf8').replace(/^version = \".*\"/m, 'version = \"' + process.env.VERSION + '\"');
            fs.writeFileSync(cargo, t);
          "
          echo "Stamped desktop version: $VERSION"

      # tauri-action runs the beforeBuildCommand (scripts/publish-sidecar.mjs), which builds
      # the SPA and publishes KRINT.API self-contained for this runner's RID, then builds the
      # installers (.deb/.rpm/.AppImage, .msi/.exe, .dmg/.app) and uploads them to the release.
      # Auto-update is off (no updater signing key set up): builds + uploads installers only.
      # To re-enable, set the TAURI_SIGNING_* secrets + tauri.conf.json pubkey, flip
      # createUpdaterArtifacts back on, and restore includeUpdaterJson here (see docs/desktop.md).
      - name: Build desktop app and upload installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ github.event.release.id }}
          # macOS: build only the .app bundle. The .dmg target's bundle_dmg.sh is flaky on headless
          # CI runners (hdiutil/AppleScript), and we already ship the .app zipped (step below), so the
          # DMG just makes releases fail. Other OSes use the targets from tauri.conf.json; local
          # `tauri build` still produces a .dmg.
          args: ${{ runner.os == 'macOS' && '--bundles app' || '' }}

      # Linux: the AppImage produced above is already the portable build, so nothing more to do.

      # Single no-install exe: rebuild with the `portable` feature, which embeds the API sidecar
      # + resources (already produced by the build step above) into krint-desktop.exe and
      # self-extracts them on launch. One ~150 MB double-clickable file.
      - name: Build & upload portable single exe (Windows)
        if: matrix.portable == 'zip' && runner.os == 'Windows'
        shell: pwsh
        working-directory: src-tauri
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo build --release --features portable
          $out = "KRINT-portable-${{ matrix.rid }}.exe"
          Copy-Item target/release/krint-desktop.exe $out
          gh release upload "${{ github.event.release.tag_name }}" $out --clobber

      - name: Package portable archive (macOS)
        if: matrix.portable == 'zip' && runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name "*.app" | head -1)
          OUT="KRINT-portable-${{ matrix.rid }}.zip"
          ditto -c -k --keepParent "$APP" "$OUT"
          gh release upload "${{ github.event.release.tag_name }}" "$OUT" --clobber
